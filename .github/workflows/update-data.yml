name: Update Data

on:
  workflow_dispatch:
  schedule:
    # Weekdays, early UTC: catches overnight upstream updates
    - cron: "17 5 * * 1-5"
    # Weekdays, late UTC: catches same-day source revisions
    - cron: "17 17 * * 1-5"
    # Weekly safety refresh
    - cron: "42 9 * * 0"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest data/changelog data/history docs/data
          if git diff --staged --quiet; then
            echo "No data changes detected."
            exit 0
          fi
          git commit -m "chore(data): automated refresh"
          git push
