<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Explorer | Country Classification Commons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260304b">
  <script src="./explorer.js?v=20260304b" defer></script>
</head>
<body>
  <header class="hero">
    <h1>Explorer</h1>
    <p>Search countries, view classifications, and copy direct data links.</p>
    <nav class="nav">
      <a href="./index.html">Home</a>
      <a href="./explorer.html" aria-current="page">Explorer</a>
      <a href="./downloads.html">Downloads & API Links</a>
    </nav>
  </header>

  <main>
    <section id="load-error" class="card error-card hidden"></section>

    <section class="controls card">
      <div>
        <label for="search">Search country</label>
        <input id="search" type="search" placeholder="Name, ISO2, ISO3, M49">
      </div>
      <div>
        <label for="source-filter">Source</label>
        <select id="source-filter"><option value="">All</option></select>
      </div>
      <div>
        <label for="type-filter">Group type</label>
        <select id="type-filter"><option value="">All</option></select>
      </div>
      <div>
        <label for="result-count">Results</label>
        <div id="result-count" class="stat-box">Loading...</div>
      </div>
    </section>

    <section class="card">
      <h2>Countries</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Country</th>
              <th>ISO3</th>
              <th>M49</th>
              <th>UN Region</th>
              <th>WB Income</th>
              <th>Memberships</th>
            </tr>
          </thead>
          <tbody id="country-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Snapshot</h2>
      <p id="snapshot-meta">Loading snapshot metadata...</p>
      <p><a href="./downloads.html">Go to Downloads & API Links</a></p>
    </section>
  </main>
</body>
</html>
